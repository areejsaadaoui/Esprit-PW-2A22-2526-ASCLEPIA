<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html lang="fr">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Ajouter un utilisateur - ASCLEPIA BackOffice</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/backoffice.css">

<style type="text/css">
/* Styles spécifiques pour la page d'ajout */
/* Cacher la sidebar et la topbar */
.admin-wrapper {
    display: block;
}

.sidebar {
    display: none;
}

.topbar {
    display: none;
}

.main-content {
    margin-left: 0;
    width: 100%;
    padding-top: 0;
}

.form-container {
    max-width: 700px;
    margin: 0 auto;
}

.form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 0;
}

.form-row .form-group {
    flex: 1;
    min-width: calc(50% - 20px);
}

.form-group-full {
    flex: 0 0 100%;
}

.error-message {
    color: var(--danger);
    font-size: 0.75rem;
    margin-top: -8px;
    margin-bottom: 12px;
    display: none;
}

.error-message.show {
    display: block;
}

.form-control.is-invalid {
    border-color: var(--danger);
    background-color: #fef2f2;
}

.form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
}

.required-star {
    color: var(--danger);
    margin-left: 2px;
}

@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
        gap: 0;
    }
    .form-row .form-group {
        min-width: 100%;
    }
    .form-actions {
        flex-direction: column-reverse;
    }
    .form-actions .btn {
        width: 100%;
        justify-content: center;
    }
}
</style>

</head>
<body>

<div class="admin-wrapper">
    <!-- Sidebar - SUPPRIMÉE -->

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar - SUPPRIMÉE -->

        <!-- Page Content -->
        <div class="page-content">
            <div class="form-container card">
                <div class="section-header" style="text-align:left; margin-bottom:28px;">
                    <div class="section-tag" style="display:inline-flex;">➕ Nouvel utilisateur</div>
                    <h2 style="margin-bottom:8px;">Ajouter un utilisateur</h2>
                    <p class="text-muted">Remplissez le formulaire ci-dessous pour créer un compte utilisateur.</p>
                </div>

                <form id="userForm" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nom complet <span class="required-star">*</span></label>
                            <input type="text" id="nom" class="form-control" placeholder="Jean Dupont">
                            <div id="nom-error" class="error-message"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email <span class="required-star">*</span></label>
                            <input type="email" id="email" class="form-control" placeholder="jean.dupont@exemple.com">
                            <div id="email-error" class="error-message"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Mot de passe <span class="required-star">*</span></label>
                            <input type="password" id="mot_de_passe" class="form-control" placeholder="Minimum 6 caractères">
                            <div id="password-error" class="error-message"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Confirmer mot de passe <span class="required-star">*</span></label>
                            <input type="password" id="confirm_password" class="form-control" placeholder="Répétez le mot de passe">
                            <div id="confirm-error" class="error-message"></div>
                        </div>
                    </div>

                    <div class="form-group form-group-full">
                        <label class="form-label">Adresse <span class="required-star">*</span></label>
                        <textarea id="adresse" class="form-control" rows="2" placeholder="123 Rue Exemple, Tunis"></textarea>
                        <div id="adresse-error" class="error-message"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Rôle <span class="required-star">*</span></label>
                            <select id="role" class="form-control">
                                <option value="">Sélectionner un rôle</option>
                                <option value="patient">👤 Patient</option>
                                <option value="medecin">👨‍⚕️ Médecin</option>
                            </select>
                            <div id="role-error" class="error-message"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Date de naissance</label>
                            <input type="date" id="date_naissance" class="form-control">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Téléphone</label>
                            <input type="tel" id="telephone" class="form-control" placeholder="+216 XX XXX XXX">
                        </div>
                    </div>

                    <div class="form-group form-group-full">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3" placeholder="Présentation de l'utilisateur..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" onclick="window.location.href='index.html';">
                            ❌ Annuler
                        </button>
                        <button type="submit" class="btn btn-primary">
                            ✅ Ajouter l'utilisateur
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
// Fonctions de validation
function showError(id, message) {
    var errorDiv = document.getElementById(id);
    var inputField = document.getElementById(id.replace('-error', ''));
    
    if (errorDiv) {
        errorDiv.innerText = message;
        errorDiv.className = 'error-message show';
    }
    
    if (inputField) {
        inputField.className = inputField.className + ' is-invalid';
    }
}

function clearErrors() {
    var errors = document.querySelectorAll(".error-message");
    for (var i = 0; i < errors.length; i++) {
        errors[i].innerText = "";
        errors[i].className = 'error-message';
    }
    
    var inputs = document.querySelectorAll(".form-control");
    for (var i = 0; i < inputs.length; i++) {
        inputs[i].className = inputs[i].className.replace(' is-invalid', '');
        inputs[i].className = inputs[i].className.replace('is-invalid', '');
    }
}

// Gestion de l'envoi du formulaire
document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault();
    clearErrors();

    var nom = document.getElementById("nom").value.trim();
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("mot_de_passe").value;
    var confirm = document.getElementById("confirm_password").value;
    var adresse = document.getElementById("adresse").value.trim();
    var role = document.getElementById("role").value;
    var date_naissance = document.getElementById("date_naissance").value;
    var telephone = document.getElementById("telephone").value;
    var description = document.getElementById("description").value;

    var valid = true;

    if (nom === "") {
        showError("nom-error", "Nom requis");
        valid = false;
    }

    if (email === "") {
        showError("email-error", "Email requis");
        valid = false;
    } else if (!email.includes('@') || !email.includes('.')) {
        showError("email-error", "Email invalide");
        valid = false;
    }

    if (password === "") {
        showError("password-error", "Mot de passe requis");
        valid = false;
    } else if (password.length < 6) {
        showError("password-error", "Minimum 6 caractères");
        valid = false;
    }

    if (confirm === "") {
        showError("confirm-error", "Confirmation requise");
        valid = false;
    } else if (password !== confirm) {
        showError("confirm-error", "Les mots de passe ne correspondent pas");
        valid = false;
    }

    if (adresse === "") {
        showError("adresse-error", "Adresse requise");
        valid = false;
    }

    if (role === "") {
        showError("role-error", "Choisir un rôle");
        valid = false;
    }

    if (valid) {
        var path = window.location.pathname;
        var addUserUrl = window.location.origin + path.substring(0, path.lastIndexOf('/') + 1) + 'adduser.php';

        // Désactiver le bouton pendant l'envoi
        var submitBtn = document.querySelector('button[type="submit"]');
        var originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '⏳ Envoi en cours...';
        submitBtn.disabled = true;

        // Préparer les données à envoyer
        var userData = {
            nom: nom,
            email: email,
            mot_de_passe: password,
            adresse: adresse,
            role: role,
            date_naissance: date_naissance,
            telephone: telephone,
            description: description
        };

        fetch(addUserUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ user: userData })
        })
        .then(function(res) {
            return res.text().then(function(text) {
                try {
                    return JSON.parse(text);
                } catch (e) {
                    throw new Error('Réponse serveur invalide : ' + text);
                }
            });
        })
        .then(function(data) {
            if (data.success) {
                alert(data.message || "Utilisateur ajouté avec succès!");
                window.location.href = "liste_users.php";
            } else {
                alert(data.message || "Erreur lors de l'ajout");
            }
        })
        .catch(function(error) {
            console.error('Erreur adduser:', error);
            alert('Erreur lors de l\'ajout : ' + error.message);
        })
        .finally(function() {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        });
    }
});

// Nettoyer l'erreur au focus
var inputs = document.querySelectorAll('.form-control');
for (var i = 0; i < inputs.length; i++) {
    inputs[i].addEventListener('focus', function() {
        this.className = this.className.replace(' is-invalid', '');
        this.className = this.className.replace('is-invalid', '');
        var errorId = this.id + '-error';
        var errorDiv = document.getElementById(errorId);
        if (errorDiv) {
            errorDiv.className = 'error-message';
        }
    });
}
</script>

</body>
</html>
