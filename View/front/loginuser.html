<script type="text/javascript">
// ==================== FONCTIONS POUR LE TÉLÉPHONE TUNISIEN ====================

// Fonction pour valider un numéro de téléphone tunisien
function validateTunisianPhone(phoneNumber) {
    // Supprimer tous les espaces et le +216 s'il est présent
    let cleaned = phoneNumber.replace(/\s/g, '');
    
    // Enlever le +216 au début si présent
    if (cleaned.startsWith('+216')) {
        cleaned = cleaned.substring(4);
    }
    
    // Enlever le 00216 si présent
    if (cleaned.startsWith('00216')) {
        cleaned = cleaned.substring(5);
    }
    
    // Vérifier que le numéro commence par un indicatif tunisien valide
    // Les opérateurs tunisiens : 2 (Tunisie Telecom), 4, 5, 9 (Orange), 3 (Ooredoo)
    // Format : 2x xxx xxx, 4x xxx xxx, 5x xxx xxx, 9x xxx xxx
    const phoneRegex = /^(2|4|5|9)\d{7}$/;
    
    // Vérifier également les numéros commençant par 7 (fixes) ou 8
    const alternativeRegex = /^[78]\d{7}$/;
    
    return phoneRegex.test(cleaned) || alternativeRegex.test(cleaned);
}

// Fonction pour formater automatiquement le numéro de téléphone tunisien
function formatTunisianPhone(phoneNumber) {
    // Supprimer tous les non-chiffres
    let cleaned = phoneNumber.replace(/\D/g, '');
    
    // Si le numéro commence par 216 (sans +), l'enlever
    if (cleaned.startsWith('216')) {
        cleaned = cleaned.substring(3);
    }
    
    // Limiter à 8 chiffres (numéro tunisien standard)
    if (cleaned.length > 8) {
        cleaned = cleaned.substring(0, 8);
    }
    
    // Formater avec des espaces tous les 2 chiffres après les 2 premiers
    if (cleaned.length > 0) {
        if (cleaned.length <= 2) {
            return cleaned;
        } else if (cleaned.length <= 4) {
            return cleaned.substring(0, 2) + ' ' + cleaned.substring(2);
        } else if (cleaned.length <= 6) {
            return cleaned.substring(0, 2) + ' ' + cleaned.substring(2, 4) + ' ' + cleaned.substring(4);
        } else {
            return cleaned.substring(0, 2) + ' ' + cleaned.substring(2, 4) + ' ' + cleaned.substring(4, 6) + ' ' + cleaned.substring(6, 8);
        }
    }
    return cleaned;
}

// Fonction pour obtenir le message d'erreur du téléphone tunisien
function getPhoneErrorMessage(phoneNumber) {
    if (!phoneNumber || phoneNumber.trim() === '') {
        return ""; // Pas d'erreur si champ vide (optionnel)
    }
    
    let cleaned = phoneNumber.replace(/\s/g, '');
    if (cleaned.startsWith('+216')) {
        cleaned = cleaned.substring(4);
    }
    if (cleaned.startsWith('00216')) {
        cleaned = cleaned.substring(5);
    }
    
    if (cleaned.length === 0) {
        return "Numéro de téléphone requis";
    }
    
    if (cleaned.length !== 8) {
        return "Le numéro tunisien doit contenir exactement 8 chiffres";
    }
    
    const firstDigit = cleaned.charAt(0);
    const validStartDigits = ['2', '3', '4', '5', '7', '8', '9'];
    
    if (!validStartDigits.includes(firstDigit)) {
        return "Numéro invalide. Doit commencer par 2,3,4,5,7,8 ou 9";
    }
    
    /*/ Messages spécifiques par opérateur
    if (firstDigit === '2') {
        return "✓ Numéro fixe Tunisie Telecom valide";
    } else if (firstDigit === '3') {
        return "✓ Numéro Ooredoo valide";
    } else if (firstDigit === '4' || firstDigit === '9') {
        return "✓ Numéro Orange valide";
    } else if (firstDigit === '5') {
        return "✓ Numéro Ooredoo/Orange valide";
    } else if (firstDigit === '7' || firstDigit === '8') {
        return "✓ Numéro fixe valide";
    }*/
    
    return "Format de téléphone tunisien invalide";
}

// Fonction pour afficher l'indice de validation en temps réel
function updatePhoneHint(phoneNumber) {
    const hintDiv = document.getElementById('phone-hint');
    if (!hintDiv) return;
    
    if (!phoneNumber || phoneNumber.trim() === '') {
        hintDiv.innerHTML = '📱 Exemple: 23 456 789 ou 98 765 432';
        hintDiv.className = 'phone-hint';
        return;
    }
    
    const isValid = validateTunisianPhone(phoneNumber);
    
    if (isValid) {
        const formatted = formatTunisianPhone(phoneNumber);
        let operatorMessage = '';
        
        let cleaned = phoneNumber.replace(/\s/g, '');
        if (cleaned.startsWith('+216')) cleaned = cleaned.substring(4);
        if (cleaned.startsWith('00216')) cleaned = cleaned.substring(5);
        
        const firstDigit = cleaned.charAt(0);
        
        if (firstDigit === '2') operatorMessage = '🏢 Tunisie Telecom (fixe)';
        else if (firstDigit === '3') operatorMessage = '📱 Ooredoo';
        else if (firstDigit === '4' || firstDigit === '9') operatorMessage = '📱 Orange';
        else if (firstDigit === '5') operatorMessage = '📱 Ooredoo/Orange';
        else if (firstDigit === '7' || firstDigit === '8') operatorMessage = '🏢 Ligne fixe';
        
        hintDiv.innerHTML = `✅ ${operatorMessage} - Format: ${formatted}`;
        hintDiv.className = 'phone-hint valid';
    } else {
        hintDiv.innerHTML = `❌ ${getPhoneErrorMessage(phoneNumber)}`;
        hintDiv.className = 'phone-hint invalid';
    }
}

// ==================== FONCTIONS POUR LE MOT DE PASSE ====================

// Fonction pour générer un mot de passe complexe et sécurisé
function generateComplexPassword() {
    const uppercaseLetters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const lowercaseLetters = 'abcdefghijkmnpqrstuvwxyz';
    const numbers = '23456789';
    const symbols = '!@#$%^&*';
    
    let password = '';
    
    for (let i = 0; i < 2; i++) {
        const randomIndex = Math.floor(Math.random() * uppercaseLetters.length);
        password += uppercaseLetters[randomIndex];
    }
    
    for (let i = 0; i < 3; i++) {
        const randomIndex = Math.floor(Math.random() * lowercaseLetters.length);
        password += lowercaseLetters[randomIndex];
    }
    
    for (let i = 0; i < 2; i++) {
        const randomIndex = Math.floor(Math.random() * numbers.length);
        password += numbers[randomIndex];
    }
    
    for (let i = 0; i < 2; i++) {
        const randomIndex = Math.floor(Math.random() * symbols.length);
        password += symbols[randomIndex];
    }
    
    password = shuffleString(password);
    
    const targetLength = Math.floor(Math.random() * (16 - 12 + 1) + 12);
    
    while (password.length < targetLength) {
        const allChars = uppercaseLetters + lowercaseLetters + numbers + symbols;
        const randomChar = allChars[Math.floor(Math.random() * allChars.length)];
        const insertPos = Math.floor(Math.random() * (password.length + 1));
        password = password.slice(0, insertPos) + randomChar + password.slice(insertPos);
    }
    
    const hasNumber = /[0-9]/.test(password);
    const hasLetter = /[a-zA-Z]/.test(password);
    const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    const hasUppercase = /[A-Z]/.test(password);
    const hasLowercase = /[a-z]/.test(password);
    
    if (!hasNumber || !hasLetter || !hasSymbol || !hasUppercase || !hasLowercase || password.length < 8) {
        return generateComplexPassword();
    }
    
    return password;
}

function shuffleString(str) {
    const array = str.split('');
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array.join('');
}

function showToast(message, isSuccess = true) {
    const existingToasts = document.querySelectorAll('.toast-notification');
    existingToasts.forEach(toast => toast.remove());
    
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = isSuccess ? 
        `✅ ${message}` : 
        `❌ ${message}`;
    
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => {
            if (toast.parentNode) toast.remove();
        }, 500);
    }, 4000);
}

function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            showToast('Mot de passe copié dans le presse-papier ! 📋');
        }).catch(() => {
            fallbackCopy(text);
        });
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        showToast('Mot de passe copié dans le presse-papier ! 📋');
    } catch (err) {
        showToast('Impossible de copier automatiquement', false);
    }
    document.body.removeChild(textarea);
}

function isPasswordValid(password) {
    if (password.length < 8) {
        return false;
    }
    
    var hasNumber = /[0-9]/.test(password);
    var hasLetter = /[a-zA-Z]/.test(password);
    var hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    
    return (hasNumber && hasLetter && hasSymbol);
}

function getPasswordErrorMessage(password) {
    if (password.length < 8) {
        return "Le mot de passe doit contenir au moins 8 caractères";
    }
    
    var hasNumber = /[0-9]/.test(password);
    var hasLetter = /[a-zA-Z]/.test(password);
    var hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    
    var missing = [];
    if (!hasNumber) missing.push("chiffres");
    if (!hasLetter) missing.push("lettres");
    if (!hasSymbol) missing.push("symboles");
    
    if (missing.length > 0) {
        return "Le mot de passe doit contenir : " + missing.join(", ");
    }
    
    return "Mot de passe invalide";
}

function showError(id, message) {
    var errorDiv = document.getElementById(id);
    var inputField = document.getElementById(id.replace('-error', ''));
    
    if (errorDiv) {
        errorDiv.innerText = message;
        errorDiv.className = 'error-message show';
    }
    
    if (inputField) {
        inputField.className = inputField.className + ' is-invalid';
    }
}

function clearErrors() {
    var errors = document.querySelectorAll(".error-message");
    for (var i = 0; i < errors.length; i++) {
        errors[i].innerText = "";
        errors[i].className = 'error-message';
    }
    
    var inputs = document.querySelectorAll(".form-control");
    for (var i = 0; i < inputs.length; i++) {
        inputs[i].className = inputs[i].className.replace(' is-invalid', '');
        inputs[i].className = inputs[i].className.replace('is-invalid', '');
    }
}

// Événement pour générer le mot de passe
document.getElementById("generatePasswordBtn").addEventListener("click", function() {
    const generatedPassword = generateComplexPassword();
    const passwordField = document.getElementById("mot_de_passe");
    const confirmField = document.getElementById("confirm_password");
    
    passwordField.value = generatedPassword;
    confirmField.value = generatedPassword;
    
    showToast('🔐 Mot de passe sécurisé généré et copié automatiquement !', true);
    copyToClipboard(generatedPassword);
    
    const inputEvent = new Event('input', { bubbles: true });
    passwordField.dispatchEvent(inputEvent);
    
    clearErrors();
    document.getElementById("email").focus();
});

// Validation du téléphone en temps réel
const phoneInput = document.getElementById("telephone");
if (phoneInput) {
    // Formater en temps réel
    phoneInput.addEventListener('input', function(e) {
        let rawValue = this.value;
        
        // Sauvegarder la position du curseur
        const cursorPos = this.selectionStart;
        
        // Formater le numéro
        let formatted = formatTunisianPhone(rawValue);
        
        // Mettre à jour la valeur
        this.value = formatted;
        
        // Mettre à jour l'indice
        updatePhoneHint(formatted);
        
        // Nettoyer l'erreur si présente
        const errorDiv = document.getElementById('telephone-error');
        if (errorDiv) {
            errorDiv.className = 'error-message';
        }
        this.className = this.className.replace(' is-invalid', '');
        this.className = this.className.replace('is-invalid', '');
    });
    
    // Valider à la perte de focus
    phoneInput.addEventListener('blur', function() {
        const phoneNumber = this.value;
        if (phoneNumber && phoneNumber.trim() !== '') {
            if (!validateTunisianPhone(phoneNumber)) {
                showError("telephone-error", getPhoneErrorMessage(phoneNumber));
                this.className = this.className + ' is-invalid';
            }
        }
    });
}

// Gestion de l'envoi du formulaire
document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault();
    clearErrors();

    var nom = document.getElementById("nom").value.trim();
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("mot_de_passe").value;
    var confirm = document.getElementById("confirm_password").value;
    var adresse = document.getElementById("adresse").value.trim();
    var role = document.getElementById("role").value;
    var date_naissance = document.getElementById("date_naissance").value;
    var telephone = document.getElementById("telephone").value;
    var description = document.getElementById("description").value;

    var valid = true;

    if (nom === "") {
        showError("nom-error", "Nom requis");
        valid = false;
    }

    if (email === "") {
        showError("email-error", "Email requis");
        valid = false;
    } else if (!email.includes('@') || !email.includes('.')) {
        showError("email-error", "Email invalide");
        valid = false;
    }

    if (password === "") {
        showError("password-error", "Mot de passe requis");
        valid = false;
    } else if (!isPasswordValid(password)) {
        showError("password-error", getPasswordErrorMessage(password));
        valid = false;
    }

    if (confirm === "") {
        showError("confirm-error", "Confirmation requise");
        valid = false;
    } else if (password !== confirm) {
        showError("confirm-error", "Les mots de passe ne correspondent pas");
        valid = false;
    }

    if (adresse === "") {
        showError("adresse-error", "Adresse requise");
        valid = false;
    }

    if (role === "") {
        showError("role-error", "Choisir un rôle");
        valid = false;
    }
    
    // Validation du téléphone tunisien
    if (telephone !== "" && !validateTunisianPhone(telephone)) {
        showError("telephone-error", getPhoneErrorMessage(telephone));
        valid = false;
    }

    if (valid) {
        var path = window.location.pathname;
        var addUserUrl = window.location.origin + path.substring(0, path.lastIndexOf('/') + 1) + 'adduser.php';

        var submitBtn = document.querySelector('button[type="submit"]');
        var originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '⏳ Envoi en cours...';
        submitBtn.disabled = true;

        // Nettoyer le téléphone avant envoi
        let cleanPhone = telephone.replace(/\s/g, '');
        if (cleanPhone.startsWith('+216')) {
            cleanPhone = cleanPhone.substring(4);
        }
        if (cleanPhone.startsWith('00216')) {
            cleanPhone = cleanPhone.substring(5);
        }

        var userData = {
            nom: nom,
            email: email,
            mot_de_passe: password,
            adresse: adresse,
            role: role,
            date_naissance: date_naissance,
            telephone: cleanPhone,
            description: description
        };

        fetch(addUserUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ user: userData })
        })
        .then(function(res) {
            return res.text().then(function(text) {
                try {
                    return JSON.parse(text);
                } catch (e) {
                    throw new Error('Réponse serveur invalide : ' + text);
                }
            });
        })
        .then(function(data) {
            if (data.success) {
                showToast(data.message || "Utilisateur ajouté avec succès!", true);
                setTimeout(function() {
                    window.location.href = "login.html";
                }, 2000);
            } else {
                showToast(data.message || "Erreur lors de l'ajout", false);
            }
        })
        .catch(function(error) {
            console.error('Erreur adduser:', error);
            showToast('Erreur lors de l\'ajout : ' + error.message, false);
        })
        .finally(function() {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        });
    }
});

// Nettoyer l'erreur au focus
var inputs = document.querySelectorAll('.form-control');
for (var i = 0; i < inputs.length; i++) {
    inputs[i].addEventListener('focus', function() {
        this.className = this.className.replace(' is-invalid', '');
        this.className = this.className.replace('is-invalid', '');
        var errorId = this.id + '-error';
        var errorDiv = document.getElementById(errorId);
        if (errorDiv) {
            errorDiv.className = 'error-message';
        }
        
        if (this.id === 'mot_de_passe') {
            var complexityMsg = document.getElementById("password-complexity");
            if (complexityMsg) {
                complexityMsg.innerHTML = "";
            }
        }
    });
}

// Vérification du mot de passe en temps réel
var passwordInputCheck = document.getElementById("mot_de_passe");
if (passwordInputCheck) {
    passwordInputCheck.addEventListener('input', function() {
        var password = this.value;
        var complexityMsg = document.getElementById("password-complexity");
        
        if (password.length > 0) {
            if (!complexityMsg) {
                complexityMsg = document.createElement("small");
                complexityMsg.id = "password-complexity";
                complexityMsg.className = "password-complexity";
                this.parentNode.appendChild(complexityMsg);
            }
            
            if (isPasswordValid(password)) {
                complexityMsg.className = "password-complexity valid";
                complexityMsg.innerHTML = "✓ Mot de passe valide (chiffres + lettres + symboles)";
            } else {
                complexityMsg.className = "password-complexity invalid";
                complexityMsg.innerHTML = "⚠ " + getPasswordErrorMessage(password);
            }
        } else if (complexityMsg) {
            complexityMsg.innerHTML = "";
        }
    });
}
</script>
