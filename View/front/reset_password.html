<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation du mot de passe — ASCLEPIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { background: var(--dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

    .auth-bg {
      position: fixed; inset: 0;
      background: var(--gradient-hero);
      z-index: 0;
    }

    .auth-bg::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%230ea5e9' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/svg%3E");
    }

    .auth-glow {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25;
    }
    .glow-1 { width: 500px; height: 500px; background: var(--primary); top: -200px; right: -100px; }
    .glow-2 { width: 400px; height: 400px; background: var(--accent); bottom: -150px; left: -100px; }

    .auth-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 460px;
      padding: 24px;
    }

    .auth-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }

    .auth-logo {
      display: flex; align-items: center; gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .auth-logo-icon {
      width: 48px; height: 48px;
      background: var(--gradient-primary);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 8px 24px rgba(14,165,233,0.4);
    }

    .auth-logo-name {
      font-size: 1.6rem; font-weight: 800; color: var(--white);
    }
    .auth-logo-name span { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .auth-title {
      text-align: center; color: var(--white);
      font-size: 1.5rem; font-weight: 700; margin-bottom: 6px;
    }

    .auth-subtitle {
      text-align: center; color: rgba(255,255,255,0.45);
      font-size: 0.88rem; margin-bottom: 32px;
    }

    .glass-input-wrap { position: relative; margin-bottom: 16px; }

    .glass-input-wrap .input-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.35); font-size: 0.95rem;
    }

    .glass-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      color: var(--white);
      font-size: 0.95rem;
      font-family: var(--font-main);
      outline: none;
      transition: var(--transition);
    }

    .glass-input::placeholder { color: rgba(255,255,255,0.3); }

    .glass-input:focus {
      border-color: var(--primary);
      background: rgba(14,165,233,0.1);
      box-shadow: 0 0 0 4px rgba(14,165,233,0.15);
    }

    .glass-input.input-error {
      border-color: #ef4444;
      background: rgba(239,68,68,0.1);
    }

    .glass-label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: rgba(255,255,255,0.6); margin-bottom: 8px;
    }

    .eye-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.3); cursor: pointer; background: none; border: none; font-size: 0.9rem;
      transition: var(--transition-fast);
    }
    .eye-toggle:hover { color: var(--primary); }

    .form-error {
      font-size: 0.78rem;
      margin-top: 6px;
      display: none;
    }

    .form-error.show {
      display: block;
    }

    .password-complexity {
      display: block;
      font-size: 0.7rem;
      margin-top: 4px;
    }

    .password-complexity.valid {
      color: #10b981;
    }

    .password-complexity.invalid {
      color: #ef4444;
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      background: var(--gradient-primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-main);
      box-shadow: 0 4px 20px rgba(14,165,233,0.4);
      transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(14,165,233,0.5);
    }

    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; padding: 12px 16px; border-radius: var(--radius);
      font-size: 0.84rem; margin-bottom: 20px; display: none;
      align-items: center; gap: 8px;
    }

    .error-msg.show {
      display: flex;
    }

    .success-msg {
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7; padding: 12px 16px; border-radius: var(--radius);
      font-size: 0.84rem; margin-bottom: 20px; display: none;
      align-items: center; gap: 8px;
    }

    .success-msg.show {
      display: flex;
    }

    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: 0.86rem; color: rgba(255,255,255,0.4);
    }

    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { color: #38bdf8; }

    /* Animation pour le formulaire de réinitialisation */
    .reset-section {
      transition: all 0.3s ease;
    }

    .reset-section.hidden {
      display: none;
    }

    .separator {
      display: flex; align-items: center; text-align: center; margin: 20px 0;
    }

    .separator::before, .separator::after {
      content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .separator span {
      padding: 0 10px; color: rgba(255,255,255,0.3); font-size: 0.75rem;
    }

    .email-badge {
      background: rgba(14,165,233,0.15); border: 1px solid rgba(14,165,233,0.3);
      border-radius: 40px; padding: 6px 14px; font-size: 0.8rem;
      display: inline-block; margin-bottom: 20px; color: #38bdf8;
    }
  </style>
</head>
<body>

<div class="auth-bg">
  <div class="auth-glow glow-1"></div>
  <div class="auth-glow glow-2"></div>
</div>

<div class="auth-container">
  <a href="index.html" class="auth-logo">
    <div class="auth-logo-icon">⚕️</div>
    <div class="auth-logo-name">ASC<span>LEPIA</span></div>
  </a>

  <div class="auth-card">
    <!-- Section 1 : Vérification de l'email -->
    <div id="emailSection" class="reset-section">
      <h1 class="auth-title">Mot de passe oublié ? 🔐</h1>
      <p class="auth-subtitle">Entrez votre email pour réinitialiser votre mot de passe</p>

      <div id="emailAlertError" class="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="emailErrorMessage">Aucun compte trouvé avec cette adresse email.</span>
      </div>

      <form id="emailForm" novalidate>
        <div style="margin-bottom: 24px;">
          <label class="glass-label">Adresse email</label>
          <div class="glass-input-wrap" style="margin-bottom: 0;">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" class="glass-input" id="email" name="email"
              placeholder="votre@email.com" autocomplete="email">
          </div>
          <div class="form-error" id="emailFieldError" style="color: #fca5a5;"></div>
        </div>

        <button type="submit" class="btn-auth" id="checkEmailBtn">
          <i class="fa-solid fa-paper-plane"></i>
          Vérifier et continuer
        </button>
      </form>
    </div>

    <!-- Section 2 : Réinitialisation du mot de passe (cachée par défaut) -->
    <div id="resetSection" class="reset-section hidden">
      <h1 class="auth-title">Nouveau mot de passe 🔑</h1>
      <p class="auth-subtitle">Pour : <span id="displayEmail" class="email-badge"></span></p>

      <div id="resetAlertError" class="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="resetErrorMessage"></span>
      </div>

      <div id="resetAlertSuccess" class="success-msg">
        <i class="fa-solid fa-check-circle"></i>
        <span>Mot de passe modifié avec succès ! Redirection...</span>
      </div>

      <form id="resetForm" novalidate>
        <div style="margin-bottom: 16px;">
          <label class="glass-label">Nouveau mot de passe <span style="color: #ef4444;">*</span></label>
          <div class="glass-input-wrap" style="margin-bottom: 0; position: relative;">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" class="glass-input" id="new_password" name="new_password"
              placeholder="8+ caractères, chiffres, lettres et symboles">
            <button type="button" class="eye-toggle" onclick="togglePassword('new_password', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="form-error" id="passwordFieldError" style="color: #fca5a5;"></div>
        </div>

        <div style="margin-bottom: 24px;">
          <label class="glass-label">Confirmer le mot de passe <span style="color: #ef4444;">*</span></label>
          <div class="glass-input-wrap" style="margin-bottom: 0; position: relative;">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" class="glass-input" id="confirm_password" name="confirm_password"
              placeholder="Répétez le mot de passe">
            <button type="button" class="eye-toggle" onclick="togglePassword('confirm_password', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="form-error" id="confirmFieldError" style="color: #fca5a5;"></div>
        </div>

        <button type="submit" class="btn-auth" id="resetBtn">
          <i class="fa-solid fa-key"></i>
          Réinitialiser le mot de passe
        </button>
      </form>

      <div class="separator">
        <span>ou</span>
      </div>

      <button type="button" class="btn-auth btn-outline-auth" id="backToEmailBtn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">
        <i class="fa-solid fa-arrow-left"></i>
        Utiliser un autre email
      </button>
    </div>

    <div class="auth-footer">
      <a href="login.html">
        <i class="fa-solid fa-arrow-left"></i> Retour à la connexion
      </a>
    </div>
  </div>
</div>

<script>
  var currentEmail = '';

  // Fonction pour vérifier la complexité du mot de passe
  function isPasswordValid(password) {
    if (password.length < 8) return false;
    var hasNumber = /[0-9]/.test(password);
    var hasLetter = /[a-zA-Z]/.test(password);
    var hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    return (hasNumber && hasLetter && hasSymbol);
  }

  function getPasswordErrorMessage(password) {
    if (password.length < 8) {
      return "Le mot de passe doit contenir au moins 8 caractères";
    }
    var hasNumber = /[0-9]/.test(password);
    var hasLetter = /[a-zA-Z]/.test(password);
    var hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    
    var missing = [];
    if (!hasNumber) missing.push("chiffres");
    if (!hasLetter) missing.push("lettres");
    if (!hasSymbol) missing.push("symboles");
    
    if (missing.length > 0) {
      return "Le mot de passe doit contenir : " + missing.join(", ");
    }
    return "Mot de passe invalide";
  }

  function validateEmail(email) {
    var re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email);
  }

  function showEmailError(message) {
    document.getElementById('emailErrorMessage').innerText = message;
    document.getElementById('emailAlertError').classList.add('show');
  }

  function hideEmailAlerts() {
    document.getElementById('emailAlertError').classList.remove('show');
  }

  function showResetError(message) {
    document.getElementById('resetErrorMessage').innerText = message;
    document.getElementById('resetAlertError').classList.add('show');
    document.getElementById('resetAlertSuccess').classList.remove('show');
  }

  function showResetSuccess() {
    document.getElementById('resetAlertError').classList.remove('show');
    document.getElementById('resetAlertSuccess').classList.add('show');
  }

  function hideResetAlerts() {
    document.getElementById('resetAlertError').classList.remove('show');
    document.getElementById('resetAlertSuccess').classList.remove('show');
  }

  function setFieldError(inputId, errorId, message) {
    var input = document.getElementById(inputId);
    var error = document.getElementById(errorId);
    input.classList.add('input-error');
    error.textContent = message;
    error.classList.add('show');
  }

  function clearFieldError(inputId, errorId) {
    var input = document.getElementById(inputId);
    if (input) input.classList.remove('input-error');
    var error = document.getElementById(errorId);
    if (error) error.classList.remove('show');
  }

  // Basculer entre les sections
  function showEmailSection() {
    document.getElementById('emailSection').classList.remove('hidden');
    document.getElementById('resetSection').classList.add('hidden');
    document.getElementById('email').value = '';
    currentEmail = '';
    hideEmailAlerts();
    clearFieldError('email', 'emailFieldError');
  }

  function showResetSection(email) {
    currentEmail = email;
    document.getElementById('displayEmail').innerHTML = email;
    document.getElementById('emailSection').classList.add('hidden');
    document.getElementById('resetSection').classList.remove('hidden');
    document.getElementById('new_password').value = '';
    document.getElementById('confirm_password').value = '';
    hideResetAlerts();
    clearFieldError('new_password', 'passwordFieldError');
    clearFieldError('confirm_password', 'confirmFieldError');
    
    // Nettoyer le message de complexité
    var complexityMsg = document.getElementById("password-complexity");
    if (complexityMsg) complexityMsg.innerHTML = "";
  }

  // Validation en temps réel du mot de passe
  var passwordInput = document.getElementById('new_password');
  if (passwordInput) {
    passwordInput.addEventListener('input', function() {
      var password = this.value;
      var complexityMsg = document.getElementById("password-complexity");
      
      clearFieldError('new_password', 'passwordFieldError');
      
      if (password.length > 0) {
        if (!complexityMsg) {
          complexityMsg = document.createElement("small");
          complexityMsg.id = "password-complexity";
          complexityMsg.className = "password-complexity";
          this.parentNode.appendChild(complexityMsg);
        }
        
        if (isPasswordValid(password)) {
          complexityMsg.className = "password-complexity valid";
          complexityMsg.innerHTML = "✓ Mot de passe valide (chiffres + lettres + symboles)";
        } else {
          complexityMsg.className = "password-complexity invalid";
          complexityMsg.innerHTML = "⚠ " + getPasswordErrorMessage(password);
        }
      } else if (complexityMsg) {
        complexityMsg.innerHTML = "";
      }
    });
  }

  // Gestion du formulaire email
  document.getElementById('emailForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    var email = document.getElementById('email').value.trim();
    var valid = true;
    
    clearFieldError('email', 'emailFieldError');
    hideEmailAlerts();
    
    if (email === '') {
      setFieldError('email', 'emailFieldError', 'L\'adresse email est requise.');
      valid = false;
    } else if (!validateEmail(email)) {
      setFieldError('email', 'emailFieldError', 'Format d\'email invalide (ex: nom@domaine.com).');
      valid = false;
    }
    
    if (!valid) return;
    
    var btn = document.getElementById('checkEmailBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Vérification...';
    
    fetch('check_email.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email: email })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        showResetSection(email);
      } else {
        showEmailError(data.message || 'Aucun compte trouvé avec cette adresse email.');
      }
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Vérifier et continuer';
    })
    .catch(function(error) {
      showEmailError('Une erreur est survenue. Veuillez réessayer.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Vérifier et continuer';
    });
  });

  // Gestion du formulaire de réinitialisation
  document.getElementById('resetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    var newPassword = document.getElementById('new_password').value;
    var confirmPassword = document.getElementById('confirm_password').value;
    var valid = true;
    
    clearFieldError('new_password', 'passwordFieldError');
    clearFieldError('confirm_password', 'confirmFieldError');
    hideResetAlerts();
    
    if (newPassword === '') {
      setFieldError('new_password', 'passwordFieldError', 'Le mot de passe est requis.');
      valid = false;
    } else if (!isPasswordValid(newPassword)) {
      setFieldError('new_password', 'passwordFieldError', getPasswordErrorMessage(newPassword));
      valid = false;
    }
    
    if (confirmPassword === '') {
      setFieldError('confirm_password', 'confirmFieldError', 'La confirmation est requise.');
      valid = false;
    } else if (newPassword !== confirmPassword) {
      setFieldError('confirm_password', 'confirmFieldError', 'Les mots de passe ne correspondent pas.');
      valid = false;
    }
    
    if (!valid) return;
    
    var btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Modification en cours...';
    
    fetch('update_password.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ 
        email: currentEmail,
        new_password: newPassword 
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        showResetSuccess();
        setTimeout(function() {
          window.location.href = 'login.html';
        }, 2000);
      } else {
        showResetError(data.message || 'Erreur lors de la modification du mot de passe.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-key"></i> Réinitialiser le mot de passe';
      }
    })
    .catch(function(error) {
      showResetError('Une erreur est survenue. Veuillez réessayer.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-key"></i> Réinitialiser le mot de passe';
    });
  });

  // Bouton retour
  document.getElementById('backToEmailBtn').addEventListener('click', function() {
    showEmailSection();
  });

  // Nettoyer les erreurs en tapant
  document.getElementById('email').addEventListener('input', function() {
    clearFieldError('email', 'emailFieldError');
    hideEmailAlerts();
  });

  function togglePassword(inputId, btn) {
    var input = document.getElementById(inputId);
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fa-regular fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fa-regular fa-eye';
    }
  }
</script>

</body>
</html>
